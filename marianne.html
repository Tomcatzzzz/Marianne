.btn-secondary {

.screen { display: none; }

// ── SPEECH ───────────────────────────────────────────────────────────────
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  recognition = new SR();
  recognition.lang = "de-DE";
  // Android braucht continuous:false - wir restarten manuell
  const isAndroid = /Android/i.test(navigator.userAgent);
  recognition.continuous = !isAndroid;
  recognition.interimResults = true;
  recognition.onresult = (e) => {
    let interim = "", final = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + " ";
      else interim += e.results[i][0].transcript;
    }
    if (final) currentTranscript += final;
    const display = (currentTranscript + interim).trim();
    const lt = document.getElementById("live-transcript");
    if (display) { lt.style.display = "block"; lt.textContent = "„" + display + "\""; }
  };
  recognition.onerror = (e) => {
    console.log("Speech error:", e.error);
    if (e.error === "no-speech" && isRecording) {
      // Auf Android neu starten bei Stille
      try { recognition.stop(); } catch(x) {}
      setTimeout(() => {
        if (isRecording) try { recognition.start(); } catch(x) {}
      }, 200);
      return;
    }
    isRecording = false;
    updateMicBtn();
  };
  recognition.onend = () => {
    if (isRecording) {
      setTimeout(() => {
        if (isRecording) try { recognition.start(); } catch(x) { isRecording = false; updateMicBtn(); }
      }, 100);
    }
  };
  return true;
}

function toggleMic() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  currentTranscript = "";
  document.getElementById("live-transcript").style.display = "none";
  document.getElementById("live-transcript").textContent = "";
  document.getElementById("btn-send").style.display = "none";
  document.getElementById("btn-rerecord").style.display = "none";

  if (!initSpeech()) {
    alert("Dein Browser unterstützt keine Spracheingabe. Bitte Chrome verwenden.");
    return;
  }
  try {
    recognition.start();
    isRecording = true;
    updateMicBtn();
  } catch(e) {
    console.log("Start error:", e);
  }
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  updateMicBtn();
  if (currentTranscript.trim()) {
    document.getElementById("btn-send").style.display = "block";
    document.getElementById("btn-rerecord").style.display = "block";
  }
}

function updateMicBtn() {
  const btn = document.getElementById("mic-btn");
  if (isRecording) {
    btn.className = "mic-btn recording";
    btn.innerHTML = "⏹<span class='mic-label'>Stoppen</span>";
  } else {
    btn.className = "mic-btn";
    btn.innerHTML = "🎤<span class='mic-label'>Sprechen</span>";
  }
}

function reRecord() {
  document.getElementById("btn-send").style.display = "none";
  document.getElementById("btn-rerecord").style.display = "none";
  document.getElementById("live-transcript").style.display = "none";
  currentTranscript = "";
  startRecording();
}

function startCategory(catName) {
  currentCat = catName;
  catQuestions = QUESTIONS.filter(q => q.cat === catName);
  // Start at first unanswered
  catIdx = catQuestions.findIndex(q => !answers[q.id]);
  if (catIdx === -1) catIdx = 0;
  openChatForQuestion();
}

function openChatForQuestion() {
  const q = catQuestions[catIdx];
  conversationHistory = [];
  currentTranscript = "";

  // Header
  document.getElementById("chat-cat-name").textContent = currentCat;
  document.getElementById("chat-counter").textContent = (catIdx+1) + " / " + catQuestions.length;

  // Reset UI
  document.getElementById("chat-messages").innerHTML = "";
  document.getElementById("live-transcript").style.display = "none";
  document.getElementById("live-transcript").textContent = "";
  document.getElementById("btn-send").style.display = "none";
  document.getElementById("btn-rerecord").style.display = "none";
  document.getElementById("saved-box").style.display = "none";

  // Show first AI message (the question, warmly phrased)
  addBubble("ai", "🌸 " + q.text);

  showScreen("chat");

  // If already answered, show it
  if (answers[q.id]) {
    addBubble("user", answers[q.id].formatted);
    addBubble("thinking", "Du hast diese Frage schon beantwortet. Möchtest du es nochmal versuchen? Drücke einfach aufs Mikrofon! 😊");
  }
}

function addBubble(type, text) {
  const msgs = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.className = "bubble " + type;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addThinkingBubble(text) {
  return addBubble("thinking", text);
}

// ── SEND ANSWER & AI CONVERSATION ────────────────────────────────────────
async function sendAnswer() {
  if (!currentTranscript.trim()) return;
  stopRecording();

  const userText = currentTranscript.trim();
  document.getElementById("btn-send").style.display = "none";
  document.getElementById("btn-rerecord").style.display = "none";

  // Show user bubble
  addBubble("user", "„" + userText + "\"");

  // Show thinking
  const thinkBubble = addThinkingBubble("✨ Ich schreibe das schön auf…");

  const q = catQuestions[catIdx];

  // Build conversation context for Gemini
  const historyText = conversationHistory.map(h =>
    (h.role === "ai" ? "Assistent: " : "Marianne: ") + h.text
  ).join("\n");

  const prompt = `Du bist ein freundlicher Schreibhelfer. Marianne (80 Jahre) hat gerade gesprochen.
Deine Aufgabe: Formuliere ihre Antwort schön und stelle eine kurze Nachfrage.

Frage an Marianne: "${q.text}"
Mariannes gesprochene Antwort: "${userText}"

Antworte NUR mit diesem JSON-Objekt, nichts davor oder danach:
{"formatted":"[Mariannes Antwort in 1-2 schönen Sätzen, Ich-Form]","followup":"[Eine kurze herzliche Nachfrage]","complete":false}`;

  try {
    const res = await fetch(GEMINI_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-goog-api-key": GEMINI_API_KEY },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 1200 }
      })
    });
    const data = await res.json();
    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    raw = raw.replace(/```json|```/g, "").trim();
    // Extract JSON object robustly
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("KI-Antwort: " + raw.substring(0, 200));
    // Fix truncated JSON by closing it if needed
    let jsonStr = jsonMatch[0];
    try { JSON.parse(jsonStr); } catch(e) {
      // Try to salvage truncated JSON
      jsonStr = jsonStr.replace(/,\s*"[^"]*"\s*:\s*[^,}\]]*$/, '') + '}';
    }
    const parsed = JSON.parse(jsonStr);
    if (!parsed.formatted) throw new Error("Kein 'formatted' in JSON");

    // Remove thinking bubble
    thinkBubble.remove();

    // Show formatted answer preview
    addBubble("user", parsed.formatted);

    // Show AI followup
    addBubble("ai", parsed.followup);

    // Save to conversationHistory
    conversationHistory.push({ role: "ai", text: q.text });
    conversationHistory.push({ role: "user", text: userText });
    conversationHistory.push({ role: "ai", text: parsed.followup });

    // Save answer
    answers[q.id] = {
      question: q,
      transcript: userText,
      formatted: parsed.formatted,
      date: new Date().toLocaleDateString("de-DE")
    };
    save();

    // Show saved confirmation
    const saved = document.getElementById("saved-box");
    saved.style.display = "block";
    setTimeout(() => { saved.style.display = "none"; }, 2500);

    // Update counter
    updateProgress();

    // If complete → show next button, else → allow more recording
    currentTranscript = "";
    document.getElementById("live-transcript").style.display = "none";

    if (parsed.complete) {
      // Show next question button
      const nextBtn = document.createElement("button");
      nextBtn.className = "btn-primary";
      nextBtn.textContent = "Nächste Frage →";
      nextBtn.style.marginTop = "8px";
      nextBtn.onclick = () => { nextBtn.remove(); nextQuestion(); };
      document.getElementById("chat-action-btns").prepend(nextBtn);
    }
    // Either way, mic is ready for follow-up
    updateMicBtn();

  } catch(e) {
    thinkBubble.remove();
    addBubble("thinking", "⚠️ Fehler: " + e.message + " – Deine Antwort wurde trotzdem gespeichert!");
    answers[q.id] = { question: q, transcript: userText, formatted: userText, date: new Date().toLocaleDateString("de-DE") };
    save();
    updateProgress();
  }
}

function nextQuestion() {
  catIdx++;
  if (catIdx >= catQuestions.length) {
    // Category done!
    showCategories();
    return;
  }
  openChatForQuestion();
}

function skipQuestion() {
  stopAll();
  nextQuestion();
}

}

    box.style.background = "#fff0f0";
    box.style.color = "#c0392b";
    box.innerHTML = "❌ <b>Kein API-Key eingetragen!</b><br>Bitte öffne die Datei im Editor und ersetze DEIN_API_KEY_HIER mit deinem echten Key.";
    return;
  }

  try {
    const res = await fetch(GEMINI_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: "Antworte nur mit: Hallo Marianne!" }] }],
        generationConfig: { maxOutputTokens: 20 }
      })
    });
    const data = await res.json();
    if (data.error) {
      box.style.background = "#fff0f0";
      box.style.color = "#c0392b";
      box.innerHTML = "❌ <b>Fehler:</b> " + data.error.message;
    } else {
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      box.style.background = "#f0fff4";
      box.style.color = "#27ae60";
      box.innerHTML = "✅ <b>API funktioniert!</b><br>Antwort der KI: &bdquo;" + reply.trim() + "&ldquo;";
    }
  } catch(e) {
    box.style.background = "#fff0f0";
    box.style.color = "#c0392b";
    box.innerHTML = "❌ <b>Netzwerkfehler:</b> Keine Verbindung zur KI.<br><small>" + e.message + "</small>";
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────
updateProgress();
</script>
</body>
</html>
